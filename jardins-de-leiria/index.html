<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BridgePoint PMO Dashboard</title>
<link rel="stylesheet" href="../assets/css/shared.css"/>
<style>
body{font-size:14px}
.app{max-width:1140px;margin:0 auto;padding:0 0 48px}

/* ── HEADER ── */
.header{background:var(--navy2);border-bottom:2px solid var(--gold)}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;flex-wrap:wrap;gap:10px}
.logo-area{display:flex;align-items:center;gap:12px}
.logo-circle{width:46px;height:46px;background:var(--navy4);border:1.5px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-name{font-size:17px;font-weight:700;color:var(--white);letter-spacing:.4px}
.brand-pcc{font-size:9px;color:var(--gold);letter-spacing:3.5px;margin-top:2px}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.doc-badge{background:rgba(201,162,39,.12);border:.5px solid var(--gold);border-radius:3px;padding:3px 10px;font-size:9px;color:var(--gold);letter-spacing:2px;display:inline-block}
.doc-version{font-size:10px;color:var(--muted)}
.lang-toggle{border:.5px solid var(--border)}
.lang-btn{padding:4px 11px}
.project-bar{background:var(--navy3);border-top:.5px solid var(--border);padding:9px 28px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.project-title{font-size:14px;font-weight:700;color:var(--white);letter-spacing:.5px}
.project-meta{font-size:10px;color:var(--muted)}

/* ── TABS ── */
.tabs{display:flex;padding:0 28px;background:var(--navy2);border-bottom:.5px solid var(--border);overflow-x:auto;gap:0}
.tab{padding:11px 14px;font-size:10px;letter-spacing:1px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap}
.tab:hover{color:var(--light)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ── MAIN ── */
.main{padding:22px 28px;display:none}
.main.active{display:block}
.slabel{font-size:9px;letter-spacing:3px;color:var(--muted);margin-bottom:14px;text-transform:uppercase}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
@media(max-width:680px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:var(--navy2);border:.5px solid var(--border);border-radius:6px;padding:14px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold)}
.kpi-lbl{font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:6px}
.kpi-num{font-size:26px;font-weight:700;line-height:1}
.kpi-sub{font-size:9px;color:var(--muted);margin-top:3px}
.kpi-bar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:8px;overflow:hidden}
.kpi-bar-fill{height:100%;border-radius:2px;transition:width .6s}

/* ── PROGRESS ── */
.prog-wrap{background:var(--navy2);border:.5px solid var(--border);border-radius:6px;padding:18px;margin-bottom:24px}
.prog-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.prog-title{font-size:12px;font-weight:600;color:var(--white)}
.prog-pct{font-size:20px;font-weight:700;color:var(--gold)}
.big-bar{height:9px;background:rgba(255,255,255,.07);border-radius:5px;overflow:hidden;margin-bottom:8px}
.big-bar-fill{height:100%;border-radius:5px;transition:width .8s;background:linear-gradient(90deg,var(--gold),var(--gold3))}
.phase-labels{display:flex;justify-content:space-between;flex-wrap:wrap;gap:3px}
.phase-lbl{font-size:8px;color:var(--muted)}

/* ── REC BOX ── */
.rec-box{background:var(--navy3);border-left:3px solid var(--gold);border-radius:0 6px 6px 0;padding:18px;margin-bottom:22px}
.rec-title{font-size:9px;letter-spacing:2px;color:var(--gold);margin-bottom:8px}
.rec-text{font-size:11px;color:var(--light);line-height:1.75}

/* ── LEGEND ── */
.legend{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--muted)}
.sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dg{background:var(--green)}.da{background:var(--amber)}.dr{background:var(--red)}.db{background:var(--blue)}

/* ── GENERIC TABLE ── */
.gtable{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:20px}
.gtable th{background:var(--navy3);color:var(--gold);font-size:9px;letter-spacing:1.5px;padding:9px 13px;text-align:left;font-weight:600;border-bottom:.5px solid var(--border)}
.gtable td{padding:8px 13px;border-bottom:.5px solid rgba(255,255,255,.04);color:var(--light);vertical-align:middle}
.gtable tr:hover td{background:rgba(255,255,255,.02)}
.gtable input[type=text],.gtable input[type=date]{background:var(--navy3);border:.5px solid var(--border);border-radius:3px;padding:3px 7px;font-size:11px;color:var(--white);outline:none;width:100%}
.gtable input:focus{border-color:var(--gold)}

/* ── STATUS BLOCK (project status tab) ── */
.cat-block{background:var(--navy2);border:.5px solid var(--border);border-radius:6px;margin-bottom:11px;overflow:hidden}
.cat-hdr{background:var(--navy3);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:.5px solid var(--border)}
.cat-title{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px}
.cat-stats{font-size:9px;color:var(--muted)}
.srow{display:grid;grid-template-columns:1fr auto auto;align-items:center;padding:9px 14px;border-bottom:.5px solid rgba(255,255,255,.04);gap:10px}
.srow:last-child{border-bottom:none}
.srow:hover{background:rgba(255,255,255,.02)}
.row-lbl{font-size:11px;color:var(--light)}
.ssel{background:transparent;border:.5px solid rgba(255,255,255,.14);border-radius:4px;padding:3px 7px;font-size:10px;cursor:pointer;outline:none;color:var(--white)}
.ssel:hover{border-color:var(--gold)}
.ssel option{background:#1A2D40;color:var(--white)}

/* ── PILLS ── */
.pill{display:inline-block;font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:.4px;white-space:nowrap}
.pg{background:rgba(46,204,113,.14);color:var(--green);border:.5px solid rgba(46,204,113,.3)}
.pa{background:rgba(243,156,18,.14);color:var(--amber);border:.5px solid rgba(243,156,18,.3)}
.pr{background:rgba(231,76,60,.14);color:var(--red);border:.5px solid rgba(231,76,60,.3)}
.pb{background:rgba(52,152,219,.14);color:var(--blue);border:.5px solid rgba(52,152,219,.3)}
.pw{background:rgba(122,155,188,.14);color:var(--muted);border:.5px solid rgba(122,155,188,.3)}

/* ── RISK MATRIX CELLS ── */
.risk-h{color:var(--red);font-weight:700}
.risk-m{color:var(--amber);font-weight:600}
.risk-l{color:var(--green)}
.risk-c{color:#C850C0;font-weight:700}

/* ── ROADMAP ── */
.rm-wrap{display:flex;flex-direction:column;position:relative;padding-left:30px}
.rm-wrap::before{content:'';position:absolute;left:10px;top:8px;bottom:8px;width:1px;background:var(--border)}
.rm-step{position:relative;padding:9px 0 9px 20px;display:flex;align-items:flex-start;gap:12px}
.rm-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);background:var(--navy2);position:absolute;left:-30px;top:8px;z-index:1;transition:all .3s}
.rm-dot.done{background:var(--green);border-color:var(--green)}
.rm-dot.active{background:var(--amber);border-color:var(--amber)}
.rm-dot.open{background:var(--navy3);border-color:rgba(255,255,255,.2)}
.rm-content{flex:1}
.rm-t{font-size:11px;font-weight:600;color:var(--light)}
.rm-n{font-size:9px;color:var(--muted);margin-top:2px}

/* ── PRIORITY TASKS ── */
.psec{margin-bottom:22px}
.phdr{display:flex;align-items:center;gap:9px;margin-bottom:9px;flex-wrap:wrap}
.pbadge{font-size:8px;letter-spacing:2px;padding:3px 8px;border-radius:2px;font-weight:700}
.p1b{background:rgba(231,76,60,.14);color:#E74C3C;border:.5px solid rgba(231,76,60,.3)}
.p2b{background:rgba(243,156,18,.14);color:#F39C12;border:.5px solid rgba(243,156,18,.3)}
.p3b{background:rgba(52,152,219,.14);color:#3498DB;border:.5px solid rgba(52,152,219,.3)}
.p4b{background:rgba(149,165,166,.14);color:#95A5A6;border:.5px solid rgba(149,165,166,.3)}
.tlist{display:flex;flex-direction:column;gap:3px}
.titem{display:flex;align-items:center;gap:9px;padding:7px 13px;background:var(--navy2);border:.5px solid var(--border);border-radius:4px;cursor:pointer;transition:background .2s}
.titem:hover{background:var(--navy3)}
.tcb{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.tcb.chk{background:var(--green);border-color:var(--green)}
.ttxt{font-size:11px;color:var(--light)}
.ttxt.done{text-decoration:line-through;color:var(--muted)}

/* ── MEETING LOG ── */
.log-wrap{background:var(--navy2);border:.5px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:18px}
.log-hdr{padding:10px 14px;border-bottom:.5px solid var(--border);background:var(--navy3);font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px}
.log-entry{padding:9px 14px;border-bottom:.5px solid rgba(255,255,255,.04);display:flex;gap:10px;align-items:flex-start}
.log-date{font-size:9px;color:var(--gold);white-space:nowrap;font-weight:700;min-width:88px}
.log-txt{font-size:11px;color:var(--muted);line-height:1.55;flex:1}
.log-del{background:none;border:none;color:rgba(231,76,60,.35);cursor:pointer;font-size:15px;padding:0 3px;flex-shrink:0}
.log-del:hover{color:var(--red)}
.log-form{padding:10px 14px;display:flex;gap:7px}
.log-inp{flex:1;background:var(--navy3);border:.5px solid var(--border);border-radius:4px;padding:6px 9px;font-size:11px;color:var(--white);outline:none}
.log-inp:focus{border-color:var(--gold)}
.log-add{background:var(--gold);color:var(--navy);border:none;border-radius:4px;padding:6px 13px;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap}
.log-add:hover{background:var(--gold3)}

/* ── ADD ROW BUTTON ── */
.add-row-btn{background:transparent;border:.5px dashed var(--border);border-radius:4px;padding:7px 14px;font-size:10px;color:var(--muted);cursor:pointer;width:100%;margin-top:6px;transition:all .2s}
.add-row-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ── FOOTER ── */
.footer{border-top:.5px solid var(--border);padding:14px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-top:28px}
.footer-brand{font-size:9px;color:var(--muted)}
.footer-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.save-btn{background:var(--gold);color:var(--navy);border:none;border-radius:4px;padding:7px 18px;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:1px}
.save-btn:hover{background:var(--gold3)}
.reset-btn{background:transparent;color:var(--muted);border:.5px solid var(--border);border-radius:4px;padding:7px 12px;font-size:10px;cursor:pointer}
.reset-btn:hover{color:var(--red);border-color:var(--red)}

/* ── TOAST ── */
.toast{position:fixed;bottom:18px;right:18px;background:var(--green);color:#fff;padding:9px 16px;border-radius:4px;font-size:11px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999}
.toast.show{opacity:1}
.toast.error{background:var(--red)}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo-area">
      <img src="../assets/css/images/bpae-logo.jpg" alt="BridgePoint Africa Europa Logo" style="width:56px;height:56px;object-fit:contain;border-radius:50%;border:1.5px solid #C9A227;background:#0F1E2E;flex-shrink:0"/>
      <div>
        <div class="brand-name">BridgePoint Africa Europa</div>
        <div class="brand-pcc" id="hdr-pcc">PROJECT CONTROL CENTER</div>
      </div>

      <div class="lang-toggle">
        <button class="lang-btn active" id="btn-pt" onclick="setLang('pt')">PT</button>

      <div class="doc-badge" id="hdr-badge"></div>
      <div class="doc-version" id="hdr-version"></div>
    </div>
  </div>

    <div class="project-meta" id="hdr-meta"></div>
  </div>
</div>

<!-- TABS -->
<div class="tabs" id="tabs-container"></div>

<!-- TAB PANELS (created dynamically) -->
<div id="tab-overview" class="main active"></div>
<div id="tab-roles" class="main"></div>
<div id="tab-deliverables" class="main"></div>
<div id="tab-status" class="main"></div>
<div id="tab-action" class="main"></div>

<div id="tab-risk" class="main"></div>

<!-- FOOTER -->
<div class="footer">

  <div class="footer-actions">

    <span id="storage-notice" style="font-size:9px;color:var(--muted)"></span>
    <input type="file" id="import-file" accept="application/json,.json" style="display:none" onchange="handleImportFile(event)"/>
    <button class="reset-btn" id="btn-export" onclick="exportState()"></button>
    <button class="reset-btn" id="btn-import" onclick="document.getElementById('import-file').click()"></button>
    <button class="reset-btn" id="btn-reset" onclick="resetConfirm()"></button>
    <button class="save-btn" id="btn-save" onclick="saveAll()"></button>
  </div>
</div>
</div>
<div class="toast" id="toast"></div>

// ═══════════════════════════════════════════════════════════
// PERSISTENCE (localStorage) — v1.0.1 Persistence Hotfix
// Replaces the non-functional window.storage API (undefined in
// production) with native browser localStorage. Storage is
// per-browser / per-device only — see known limitation in repo docs.
// ═══════════════════════════════════════════════════════════
function isPlainObject(v){
  return !!v && typeof v==='object' && !Array.isArray(v);
}

function loadState(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(raw){
      const sv=JSON.parse(raw);
      if(isPlainObject(sv)){
        Object.assign(S,sv);
        lang=S.lang||'pt';
      } else {
        console.warn('[BridgePoint PMO] Saved data at "'+STORE_KEY+'" is not a valid object — ignoring and using defaults.');
      }
    }
  }catch(e){
    console.warn('[BridgePoint PMO] Could not read saved data from localStorage — starting from defaults.',e);
  }
  // init dynamic arrays from translation defaults if null
  ['delivData','actionData','docData','riskData','decData'].forEach(k=>{
    if(!S[k]) S[k]=null;
  });
  updateLangBtns();
  buildTabs();
  renderAll();
}

function saveAll(){
  S.lang=lang;
  try{
    localStorage.setItem(STORE_KEY,JSON.stringify(S));
    showToast(T[lang].saved);
  }catch(e){
    console.warn('[BridgePoint PMO] Failed to save data to localStorage.',e);
    showToast(T[lang].saveError,true);
  }
}

function resetConfirm(){
  if(confirm(T[lang].resetMsg)){
    S=JSON.parse(JSON.stringify(DS));
    lang='pt';
    updateLangBtns();
    buildTabs();
    renderAll();
    saveAll();
    showToast(T[lang].resetDone);
  }
}

function showToast(msg,isError){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.toggle('error',!!isError);
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ─── EXPORT / IMPORT (additive local backup controls) ────
function exportState(){
  try{
    S.lang=lang;
    const payload={
      __bridgepointExport:true,
      exportedAt:new Date().toISOString(),
      storeKey:STORE_KEY,
      state:S,
    };
    const json=JSON.stringify(payload,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const ts=new Date().toISOString().replace(/[:.]/g,'-');
    const a=document.createElement('a');
    a.href=url;
    a.download='bridgepoint-pmo-jardins-de-leiria-'+ts+'.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast(T[lang].exportDone);
  }catch(e){
    console.warn('[BridgePoint PMO] Export failed.',e);
    showToast(T[lang].exportError,true);
  }
}

function handleImportFile(event){
  const input=event.target;
  const file=input.files&&input.files[0];
  input.value=''; // allow re-selecting the same file again later
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(){
    let parsed;
    try{
      parsed=JSON.parse(String(reader.result));
    }catch(e){
      console.warn('[BridgePoint PMO] Import failed: file is not valid JSON.',e);
      showToast(T[lang].importInvalid,true);
      return;
    }
    if(!isPlainObject(parsed)){
      console.warn('[BridgePoint PMO] Import failed: JSON payload is not an object.');
      showToast(T[lang].importInvalid,true);
      return;
    }
    // Accept either our own export wrapper ({state:{...}}) or a raw state object
    const candidate=isPlainObject(parsed.state)?parsed.state:parsed;
    if(!isPlainObject(candidate)){
      console.warn('[BridgePoint PMO] Import failed: state payload is not an object.');
      showToast(T[lang].importInvalid,true);
      return;
    }
    if(!confirm(T[lang].importConfirm)) return;
    try{
      const next=JSON.parse(JSON.stringify(DS));
      Object.assign(next,candidate);
      S=next;
      lang=S.lang||lang;
      updateLangBtns();
      buildTabs();
      renderAll();
      saveAll();
      showToast(T[lang].importDone);
    }catch(e){
      console.warn('[BridgePoint PMO] Import failed while applying data.',e);
      showToast(T[lang].importError,true);
    }
  };
  reader.onerror=function(){
    console.warn('[BridgePoint PMO] Import failed: could not read the selected file.');
    showToast(T[lang].importError,true);
  };
  reader.readAsText(file);
}

function calcStats(){
  const t=T[lang]; let total=0,done=0,inprog=0,open=0;
  t.categories.forEach(cat=>{
    const ss=S.statusData[cat.id]||[];
    cat.items.forEach((_,i)=>{ total++; const v=ss[i]||'red'; if(v==='green')done++; else if(v==='amber')inprog++; else open++; });
  });
  let td=0,tt=0;
  S.tasksData.forEach(arr=>arr.forEach(v=>{ tt++; if(v)td++; }));
  return{total,done,inprog,open,tasks_done:td,tasks_total:tt};
}

      <div class="tlist">${p.tasks.map((task,ti)=>`
        <div class="titem" onclick="toggleTask(${pi},${ti})">
          <div class="tcb ${tasks[ti]?'chk':''}">
            ${tasks[ti]?'<svg width="9" height="9" viewBox="0 0 10 10"><path d="M2 5L4 7L8 3" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>':''}
          </div>
          <span class="ttxt ${tasks[ti]?'done':''}">${task}</span>
        </div>`).join('')}
      </div></div>`;
  });
  document.getElementById('tab-tracker').innerHTML=html;
}
function toggleTask(pi,ti){
  if(!S.tasksData[pi])S.tasksData[pi]=[];
  S.tasksData[pi][ti]=!S.tasksData[pi][ti];
  renderTracker(); renderOverview();
}

// ─── ROADMAP ────────────────────────────────────────────
function renderRoadmap(){
  const t=T[lang];
  const steps=t.roadmapSteps.map((s,i)=>{
    const st=S.roadmapData[i]||'open';
    const opts=[{v:'done',l:lang==='pt'?'✓ Concluído':'✓ Completed'},{v:'active',l:lang==='pt'?'◐ Em Curso':'◐ In Progress'},{v:'open',l:lang==='pt'?'○ Em Aberto':'○ Open'}]
      .map(o=>`<option value="${o.v}" ${st===o.v?'selected':''}>${o.l}</option>`).join('');
    return `<div class="rm-step">
      <div class="rm-dot ${st}"></div>
      <div class="rm-content">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span class="rm-t">${s.title}</span>
          <select class="ssel" style="font-size:9px;padding:2px 6px" onchange="updateRoadmap(${i},this.value)">${opts}</select>
        </div>
        <div class="rm-n">${s.note}</div>
      </div></div>`;
  }).join('');
  document.getElementById('tab-roadmap').innerHTML=`
    <div class="slabel">${t.roadmapSec}</div>
    <div class="rm-wrap">${steps}</div>`;
}
function updateRoadmap(i,val){ S.roadmapData[i]=val; renderRoadmap(); }

// ─── DECISION LOG ───────────────────────────────────────
function getDecData(){
  if(!S.decData) S.decData=T[lang].decItems.map(d=>({...d}));
  return S.decData;
}
function renderDecisions(){
  const t=T[lang]; const data=getDecData();
  const rows=data.map((d,i)=>`
    <tr>
      <td><input type="date" value="${d.date}" onchange="updateDecField(${i},'date',this.value)" style="min-width:120px;color:var(--muted)"/></td>
      <td><input type="text" value="${d.decision}" onchange="updateDecField(${i},'decision',this.value)" style="min-width:240px"/></td>
      <td><input type="text" value="${d.by}" onchange="updateDecField(${i},'by',this.value)" style="min-width:130px"/></td>
      <td><input type="text" value="${d.notes||''}" placeholder="—" onchange="updateDecField(${i},'notes',this.value)" style="min-width:140px"/></td>
      <td><button onclick="deleteDecRow(${i})" style="background:none;border:none;color:rgba(231,76,60,.4);cursor:pointer;font-size:14px">×</button></td>
    </tr>`).join('');
  document.getElementById('tab-decisions').innerHTML=`
    <div class="slabel">${t.decisionsSec}</div>
    <table class="gtable"><thead><tr>
      <th>${t.thDecDate}</th><th>${t.thDecision}</th><th>${t.thDecBy}</th><th>${t.thDecNotes}</th><th></th>
    </tr></thead><tbody>${rows}</tbody></table>
    <button class="add-row-btn" onclick="addDecRow()">${t.addRow}</button>`;
}
function updateDecField(i,f,v){ getDecData()[i][f]=v; }
function deleteDecRow(i){ getDecData().splice(i,1); renderDecisions(); }
function addDecRow(){ getDecData().push({date:'',decision:'',by:'',notes:''}); renderDecisions(); }

// ─── MEETING LOG ────────────────────────────────────────
function renderLog(){
  const t=T[lang];
  const initial=[{date:lang==='pt'?'Julho 2026':'July 2026',text:t.logInitial},{date:t.logEntry2Date,text:t.logEntry2}];
  const all=[...initial,...(S.logData||[])];
  const entries=all.map((e,i)=>`
    <div class="log-entry">
      <div class="log-date">${e.date}</div>
      <div class="log-txt">${e.text}</div>
      ${i>=initial.length?`<button class="log-del" onclick="deleteLog(${i-initial.length})">×</button>`:''}
    </div>`).join('');
  document.getElementById('tab-log').innerHTML=`
    <div class="slabel">${t.logSec}</div>
    <div class="log-wrap">
      <div class="log-hdr">${t.logTitle}</div>
      <div id="log-entries">${entries}</div>
      <div class="log-form">
        <input class="log-inp" id="log-inp" type="text" placeholder="${t.logPlaceholder}" onkeydown="if(event.key==='Enter')addLog()"/>
        <button class="log-add" onclick="addLog()">${t.addEntry}</button>
      </div>
    </div>`;
}
function addLog(){
  const inp=document.getElementById('log-inp');
  const txt=inp.value.trim(); if(!txt)return;
  const now=new Date();
  const date=now.toLocaleDateString(lang==='pt'?'pt-PT':'en-GB',{day:'2-digit',month:'short',year:'numeric'});
  if(!S.logData)S.logData=[];
  S.logData.unshift({date,text:txt});
  inp.value=''; renderLog(); saveAll();
}
function deleteLog(i){ S.logData.splice(i,1); renderLog(); saveAll(); }

// ═══ INIT ═══
loadState();
</script>
</body>
</html>
