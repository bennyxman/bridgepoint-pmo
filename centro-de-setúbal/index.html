<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BridgePoint — Centro de Setúbal</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="stylesheet" href="../assets/css/shared.css"/>
<style>
body{display:flex;align-items:center;justify-content:center;padding:24px}
.card{max-width:460px}
.brand-row{gap:14px;margin-bottom:24px}
.logo-img{width:52px;height:52px}
.brand-name{font-size:15px}
.brand-sub{font-size:8px;margin-top:3px}
.divider{width:40px;margin-bottom:20px}
.label{font-size:9px;letter-spacing:3px;color:#7A9BBC;margin-bottom:10px}
.title{font-size:18px;font-weight:700;color:#FFFFFF;margin-bottom:14px}
.desc{font-size:11px;color:#7A9BBC;line-height:1.8;margin-bottom:28px}
.btn{display:inline-block;background:transparent;color:#7A9BBC;border:.5px solid rgba(122,155,188,.3);border-radius:4px;padding:9px 20px;font-size:10px;font-weight:600;letter-spacing:1px;text-decoration:none;transition:all .2s}
.btn:hover{color:#DDEAF7;border-color:rgba(201,162,39,.4)}
</style>
</head>
<body>
<div class="card">
  <div class="brand-row">
    <img class="logo-img" src="../assets/css/images/bpae-logo.jpg" alt="BridgePoint Africa Europa"/>
    <div class="brand-text">
      <div class="brand-name">BridgePoint<br/>Africa Europa</div>
      <div class="brand-sub">PROJECT PORTAL</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="label">EM PREPARAÇÃO · COMING SOON</div>
  <div class="title">Centro de Setúbal</div>
  <div class="desc">Este espaço de trabalho está a ser preparado.<br/>Por favor, contacte a BridgePoint Africa Europa para acesso.</div>
  <a class="btn" href="/">← Portal</a>
</div>
</body>
</html>
